name: Post to Slack

on:
  push:
    branches:
      - main

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if result.md changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^output/result.md$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Slack
        if: steps.check.outputs.changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, re, pathlib, subprocess, os, time

          text = pathlib.Path("output/result.md").read_text().strip()
          webhook = os.environ["SLACK_WEBHOOK_URL"]

          # Split into paper entries (separated by blank lines)
          entries = [e.strip() for e in re.split(r'\n\n+', text) if e.strip()]

          for entry in entries:
              lines = entry.split('\n')
              elements = []
              for i, line in enumerate(lines):
                  if i == 0:
                      title = re.sub(r'^-\s*\*?(.*?)\*?$', r'\1', line)
                      elements.append({"type": "text", "text": title, "style": {"bold": True}})
                  elif line.startswith("http"):
                      elements.append({"type": "text", "text": "\n"})
                      elements.append({"type": "link", "url": line.strip()})
                  else:
                      elements.append({"type": "text", "text": "\n" + line})

              payload = json.dumps({
                  "blocks": [{
                      "type": "rich_text",
                      "elements": [{
                          "type": "rich_text_section",
                          "elements": elements
                      }]
                  }]
              })

              result = subprocess.run(
                  ["curl", "-X", "POST", webhook,
                   "-H", "Content-type: application/json",
                   "--data", payload,
                   "--fail", "--silent", "--show-error"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"Error posting: {result.stderr}", flush=True)
                  raise SystemExit(1)

              # Brief pause between messages to preserve ordering
              time.sleep(1)
          PYEOF
